{% extends "base.html" %}

{% block title %}
  Главная страница
{% endblock %}

{% block content %}
  <h1>Публикации</h1>
  {% for post in posts %}
    <article>
      <h2>{{ post.location }}</h2>
      <p>{{ post.date }}</p>
      <p>{{ post.text|truncatewords:20 }}</p>
      <a href="{% url 'blog:detail' post.id %}">Читать полностью</a>
    </article>
    {% if not forloop.last %}<hr>{% endif %}
  {% endfor %}
{% endblock %}
